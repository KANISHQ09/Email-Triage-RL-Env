name: email_env
description: >
  AI Email Triage Environment — a multi-step reinforcement learning environment
  where an agent must classify, categorize, and reply to emails across three
  difficulty levels (easy / medium / hard).
version: "1.0"
author: your-username

tasks:
  - name: spam_detection
    difficulty: easy
    description: Classify email as spam or not_spam
    action_type: classify
    reward_weight: 0.4

  - name: category_classification
    difficulty: medium
    description: Classify + categorize email (work / personal / promotion)
    action_types: [classify, categorize]
    reward_weight: 0.7

  - name: full_decision
    difficulty: hard
    description: Full pipeline — classify, categorize, and reply
    action_types: [classify, categorize, reply]
    reward_weight: 1.0

environment:
  entry_point: env:EmailEnv
  observation_type: structured
  action_space: [classify, categorize, reply]
  max_steps: 3
  reward_range: [0.0, 1.0]

inference:
  entry_point: inference:main
  required_env_vars:
    - HF_TOKEN
  optional_env_vars:
    - API_BASE_URL
    - MODEL_NAME
