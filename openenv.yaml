name: email_env
description: AI Email Triage Environment
version: "1.1"
author: Kantik09

tasks:
  - id: "spam_detection"
    name: "Spam Detection"
    difficulty: "easy"
    description: "Classify email as spam or not_spam. WARNING: Catastrophic penalty (-0.40) for approving Phishing emails."
    grader: "GradeSpam"
    reward_range: [0.01, 0.99]
    metrics:
      - id: "score"
        range: [0.01, 0.99]
      - id: "cost"
        range: [0.01, 0.99]

  - id: "category_classification"
    name: "Category Classification"
    difficulty: "medium"
    description: "Classify + categorize email. Bonuses for consistency (+0.10) and perfect detail mapping."
    grader: "GradeCategory"
    reward_range: [0.01, 0.99]
    metrics:
      - id: "score"
        range: [0.01, 0.99]
      - id: "cost"
        range: [0.01, 0.99]

  - id: "full_decision"
    name: "Full Decision"
    difficulty: "hard"
    description: "Full pipeline — classify, categorize, and reply. Max bonus for consistency (+0.15) and explanation (+0.04)."
    grader: "GradeFull"
    reward_range: [0.01, 0.99]
    metrics:
      - id: "score"
        range: [0.01, 0.99]
      - id: "cost"
        range: [0.01, 0.99]
      - id: "carbon"
        range: [0.01, 0.99]

graders:
  - id: "GradeSpam"
    name: "Spam Detection Grader"
    type: "state_based"
  - id: "GradeCategory"
    name: "Category Grader"
    type: "state_based"
  - id: "GradeFull"
    name: "Full Pipeline Grader"
    type: "state_based"

environment:
  entry_point: env:EmailEnv
  observation_type: structured
  action_space: [classify, categorize, reply]
  max_steps: 3
  reward_range: [0.01, 0.99]

inference:
  entry_point: inference:main
  required_env_vars:
    - HF_TOKEN