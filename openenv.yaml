name: email_env
description: AI Email Triage Environment
version: "1.0"
author: your-username

tasks:
  - id: "easy"
    name: "spam_detection"
    difficulty: "easy"
    description: "Classify email as spam or not_spam"
    action_type: "classify"
    grader: "easy_grader"
    grader_type: "deterministic"
    max_steps: 1

  - id: "medium"
    name: "category_classification"
    difficulty: "medium"
    description: "Classify + categorize email"
    action_types: ["classify", "categorize"]
    grader: "medium_grader"
    grader_type: "deterministic"
    max_steps: 2

  - id: "hard"
    name: "full_decision"
    difficulty: "hard"
    description: "Full pipeline — classify, categorize, and reply"
    action_types: ["classify", "categorize", "reply"]
    grader: "hard_grader"
    grader_type: "deterministic"
    max_steps: 3

graders:
  - id: "easy_grader"
    name: "Easy Grader"
    type: "deterministic"
    task_id: "easy"
  - id: "medium_grader"
    name: "Medium Grader"
    type: "deterministic"
    task_id: "medium"
  - id: "hard_grader"
    name: "Hard Grader"
    type: "deterministic"
    task_id: "hard"

metrics:
  - name: "score"
    type: "float"
    range: [0.0, 1.0]

environment:
  entry_point: env:EmailEnv
  observation_type: structured
  action_space: [classify, categorize, reply]
  max_steps: 3
  reward_range: [0.0, 1.0]

inference:
  entry_point: inference:main
  required_env_vars:
    - HF_TOKEN